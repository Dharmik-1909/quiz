              <!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz App</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="wrapper">

        <div class="top">
            <div class="timer">
                <span id="min">01</span> :
                <span id="sec">00</span>
            </div>
        </div>

        <div class="question-box">
            <h2 id="question"></h2>
        </div>

        <div class="options">
            <div class="option">
                <input type="radio" name="answer" id="option1" value="0">
                <label for="option1" id="label1"></label>
            </div>

            <div class="option">
                <input type="radio" name="answer" id="option2" value="1">
                <label for="option2" id="label2"></label>
            </div>

            <div class="option">
                <input type="radio" name="answer" id="option3" value="2">
                <label for="option3" id="label3"></label>
            </div>

            <div class="option">
                <input type="radio" name="answer" id="option4" value="3">
                <label for="option4" id="label4"></label>
            </div>
        </div>

        <div class="footer">
            <button id="prev" class="btn">Previous</button>
            <button id="submit">Submit</button>
            <button id="next" class="btn">Next</button>
        </div>

    <script src="script.js"></script>
</body>

</html>
